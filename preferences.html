<style>
  .container {
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .setting {
    margin-bottom: 12px;
  }
  label {
    display: block;
    margin-bottom: 4px;
    font-weight: 500;
  }
  input[type="checkbox"] {
    margin-right: 8px;
  }
  input[type="number"] {
    width: 60px;
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
</style>

<div class="container">
  <div class="setting">
    <label>
      <input type="checkbox" id="enabled" preference="enabled" checked>
      Enable Smart Anchor
    </label>
  </div>
  
  <div class="setting">
    <label for="aspect-threshold">Aspect Ratio Threshold:</label>
    <input type="number" id="aspect-threshold" preference="aspect-threshold" value="1.3" step="0.1" min="0.5" max="3">
    <span>(Videos below this ratio anchor vertically)</span>
  </div>
  
  <div class="setting">
    <label for="edge-margin">Edge Margin (px):</label>
    <input type="number" id="edge-margin" preference="edge-margin" value="20" min="0" max="100">
  </div>
  
  <div class="setting">
    <label for="animation-duration">Animation Duration (ms):</label>
    <input type="number" id="animation-duration" preference="animation-duration" value="300" min="0" max="1000">
  </div>
  
  <div class="setting">
    <label>
      <input type="checkbox" id="show-guidelines" preference="show-guidelines" checked>
      Show Visual Guidelines
    </label>
  </div>
</div>

<script>
  document.querySelectorAll('input[preference]').forEach(input => {
    input.addEventListener('change', () => {
      preferences[input.getAttribute('preference')] = input.type === 'checkbox' 
        ? input.checked 
        : parseFloat(input.value);
    });
  });
</script>
